name: Release

# Every push to main that passes the test suites automatically publishes a
# GitHub Release of the packaged extension. The release is tagged from
# manifest.json's version:
#   - new version  -> a new release is created (and tagged)
#   - same version -> the existing release's zip and notes are refreshed
# So the latest release always carries the newest passing build, and bumping
# manifest.json is the only step needed to cut a new numbered release.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run test suites
        run: |
          node test/calc.test.mjs
          node test/parser.test.mjs

      - name: Package extension
        run: node tools/package.mjs

      - name: Publish or refresh release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./manifest.json').version")"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Refreshing existing release $TAG"
            gh release upload "$TAG" dist/*.zip --clobber
            gh release edit "$TAG" --notes-file dist/RELEASE_NOTES.md
          else
            echo "Creating release $TAG"
            gh release create "$TAG" dist/*.zip \
              --target "$GITHUB_SHA" \
              --title "Whisky Auction Landed-Cost Calculator $TAG" \
              --notes-file dist/RELEASE_NOTES.md
          fi
